<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pin's Birthday Bingo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Cabin+Sketch:wght@400;700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Monoton&family=Permanent+Marker&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>🎉 Pin's Birthday Challenge 🎉</h1>
    </header>

    <nav>
        <button class="tab-button active" data-tab="home">Home</button>
        <button class="tab-button" data-tab="films">Film Bingo</button>
        <button class="tab-button" data-tab="geocaching">Geocaching Bingo</button>
    </nav>

    <main>
        <section id="home" class="tab-content active">
            <h2>Welcome!</h2>
            <p>Birthday challenge instructions go here.</p>
        </section>

        <section id="films" class="tab-content">
            <h2>Film Bingo</h2>
            <div id="film-grid" class="bingo-grid"></div>
        </section>

        <section id="geocaching" class="tab-content">
            <h2>Geocaching Bingo</h2>
            <div id="geocache-grid" class="bingo-grid"></div>
        </section>
    </main>
    <div id="toast" class="toast"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

</body>
</html>
