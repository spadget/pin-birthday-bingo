name: Piniverse progress

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-progress:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Read previous state
        id: state
        run: |
          echo "completed=$(node -pe "require('./.piniverse-state.json').completed")" >> $GITHUB_OUTPUT

      - name: Count completed squares
        id: count
        run: |
          response=$(curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/bingo_progress?select=item&completed=eq.true")

          count=$(echo "$response" | jq length)

          echo "Completed squares: $count"
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Compare counts
        run: |
          echo "Previous: ${{ steps.state.outputs.completed }}"
          echo "Current: ${{ steps.count.outputs.count }}"

      - name: Send ntfy test
        run: |
          curl \
            -H "Title: Piniverse test" \
            -H "Tags: pushpin,rainbow" \
            -d "GitHub can send notifications successfully 🎉" \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }}