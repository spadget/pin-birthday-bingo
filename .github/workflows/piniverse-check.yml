name: Piniverse progress

on:
  workflow_dispatch:

  schedule:
    - cron: "45 * * * *"

permissions:
  contents: write

jobs:
  check-progress:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Read previous state
        id: state
        run: |
          echo "completed=$(node -pe "require('./.piniverse-state.json').completed")" >> "$GITHUB_OUTPUT"

      - name: Count completed squares
        id: count
        run: |
          response=$(curl --fail --silent --show-error \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/bingo_progress?select=item&completed=eq.true")

          count=$(echo "$response" | jq length)

          echo "Completed squares: $count"
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Notify if progress increased
        if: ${{ fromJSON(steps.count.outputs.count) > fromJSON(steps.state.outputs.completed) }}
        run: |
          increase=$(( ${{ steps.count.outputs.count }} - ${{ steps.state.outputs.completed }} ))

          curl --fail --silent --show-error \
            -H "Title: Piniverse update 📌" \
            -H "Tags: tada,pushpin" \
            -d "Pin completed $increase more square(s)! Total progress: ${{ steps.count.outputs.count }}/50" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"

      - name: Update saved count
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync(
              '.piniverse-state.json',
              JSON.stringify(
                { completed: Number('${{ steps.count.outputs.count }}') },
                null,
                2
              ) + '\n'
            );
          "

      - name: Commit updated count
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- .piniverse-state.json; then
            echo "Count has not changed."
          else
            git add .piniverse-state.json
            git commit -m "Update Piniverse progress state"
            git push
          fi