name: Piniverse progress

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-notification:
    runs-on: ubuntu-latest

    steps:
        
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Read previous state
        id: state
        run: |
            echo "completed=$(node -pe "require('./.piniverse-state.json').completed")" >> $GITHUB_OUTPUT

            - name: Count completed squares
            run: |
              response=$(curl -s \
                -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
                -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
                "${{ secrets.SUPABASE_URL }}/rest/v1/bingo_progress?select=item&completed=eq.true")
    
              echo "$response"
    
              count=$(echo "$response" | jq length)
    
              echo "Completed squares: $count"

      - name: Send ntfy test
        run: |
          curl \
            -H "Title: Piniverse test" \
            -H "Tags: pushpin,rainbow" \
            -d "GitHub can send notifications successfully 🎉" \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }}