name: Piniverse progress

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-notification:
    runs-on: ubuntu-latest

    steps:
        
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Send ntfy test
        run: |
          curl \
            -H "Title: Piniverse test" \
            -H "Tags: pushpin,rainbow" \
            -d "GitHub can send notifications successfully 🎉" \
            https://ntfy.sh/${{ secrets.NTFY_TOPIC }}